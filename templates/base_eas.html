{% load static %}
<html lang="ko">
  <head>
      <link rel="shortcut icon" href="{% static 'img/daejindojang.ico' %}">
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
      <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
      <title>대진산업_전자결재</title>

<style>
    .eas-navbar{
        background: #0f172a;
        border-bottom: 1px solid #1e293b;
        padding: 14px 0;
    }

    .eas-navbar-grid{
        width: 100%;
    }

    .eas-navbar-main{
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 56px;
        padding-left: 0;
        padding-right: 0;
    }

    .eas-nav-left,
    .eas-nav-right{
        display: flex;
        align-items: center;
        gap: 10px;
    }

      .eas-brand{
          display: inline-flex;
          align-items: center;
          justify-content: center;
          height: 38px;
          margin: 0;
          padding: 0 2px;
          color: #ffffff !important;
          font-size: 22px;
          font-weight: 800;
          letter-spacing: 0.02em;
          text-decoration: none;
          line-height: 1;
          white-space: nowrap;
          background: transparent;
          border: 0;
          position: relative;
          overflow: hidden;
          transition:
              transform 0.22s ease,
              text-shadow 0.22s ease,
              opacity 0.22s ease;
      }

      .eas-brand:hover{
          color: #ffffff !important;
          text-decoration: none;
          transform: scale(1.045);
          text-shadow:
              0 0 8px rgba(96,165,250,0.45),
              0 0 18px rgba(59,130,246,0.28);
          opacity: 1;
      }

      .eas-brand::before{
        content: '';
        position: absolute;
        top: -20%;
        left: -35%;
        width: 28%;
        height: 140%;
        background: linear-gradient(
            90deg,
            rgba(255,255,255,0) 0%,
            rgba(147,197,253,0.18) 45%,
            rgba(255,255,255,0.55) 50%,
            rgba(147,197,253,0.18) 55%,
            rgba(255,255,255,0) 100%
        );
        transform: skewX(-20deg);
        opacity: 0;
        pointer-events: none;
    }

    .eas-brand:hover::before{
        opacity: 1;
        animation: easBrandShimmer 0.55s ease;
    }

    @keyframes easBrandShimmer{
        0%{
            left: -35%;
        }
        100%{
            left: 125%;
        }
    }
    .eas-nav-create-btn{
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 38px;
        padding: 0 14px;
        border-radius: 8px;
        background: transparent;
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        border: 1px solid rgba(255,255,255,0.9);
        white-space: nowrap;
    }

    .eas-nav-create-btn:hover{
        color: #ffffff;
        background: rgba(255,255,255,0.06);
        text-decoration: none;
    }

    .eas-nav-search{
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0;
    }

    .eas-search-input{
        width: 280px;
        height: 38px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #ffffff;
        color: #111827;
        font-size: 14px;
        padding: 0 12px;
        box-shadow: none !important;
    }

    .eas-search-input::placeholder{
        color: #9ca3af;
    }

    .eas-search-input:focus{
        border-color: #93c5fd;
        box-shadow: 0 0 0 3px rgba(147,197,253,0.18) !important;
    }

    .eas-search-btn{
        height: 38px;
        padding: 0 14px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
    }

    .eas-search-btn:hover{
        background: #334155;
    }

    .eas-outline-btn{
        height: 38px;
        padding: 0 14px;
        border-radius: 8px;
        border: 1px solid #475569;
        background: transparent;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
    }

    .eas-outline-btn:hover{
        background: rgba(255,255,255,0.06);
    }

    @media (max-width: 991.98px){
        .eas-navbar{
            padding: 10px 0;
        }

        .eas-navbar-main{
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
            padding-left: 12px;
            padding-right: 12px;
        }

        .eas-nav-left,
        .eas-nav-right{
            width: 100%;
        }

        .eas-nav-right{
            flex-direction: column;
            align-items: stretch;
        }

        .eas-nav-search{
            width: 100%;
        }

        .eas-search-input{
            width: 100%;
        }

        .eas-search-btn,
        .eas-outline-btn,
        .eas-nav-create-btn{
            justify-content: center;
        }
    }
</style>
  </head>

  <body>
    <nav class="eas-navbar">
        <div class="container eas-navbar-grid">
            <div class="row justify-content-between">
                <div class="col-1 d-none d-sm-block"></div>

                <div class="col-lg-9 col-md-12 col-sm-12">
                    <div class="eas-navbar-main">
                      <div class="eas-nav-left">
                          <a class="eas-brand" href="{% url 'eas:index' %}" accesskey="j">EAS</a>
                          <a class="eas-nav-create-btn" href="{% url 'eas:Request_create' %}" accesskey="w">작성하기</a>
                          <a class="d-none" href="{% url 'eas:Request_create_24' %}" accesskey="R">write</a>
                          <a class="d-none" href="/hometax" accesskey="h">hometax</a>
                      </div>
                        <div class="eas-nav-right">
                            <form id="navbarSearchForm" class="eas-nav-search" method="get" action="{% url 'eas:index' %}">
                                <input
                                    type="text"
                                    id="navbar_search_kw"
                                    name="kw"
                                    class="form-control eas-search-input"
                                    accesskey="a"
                                    value="{{ kw|default_if_none:'' }}"
                                    placeholder="상세검색"
                                >
                                <input type="hidden" name="page" value="1">
                                <button class="eas-search-btn" type="submit">검색</button>
                                <button
                                    class="eas-outline-btn"
                                    type="button"
                                    onclick="window.open('http://3.37.211.248/eas/account.html','window_name','width=730,height=195,left=710,top=86,location=no,status=no,scrollbars=yes');"
                                    accesskey="q">계좌조회</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-1 d-none d-sm-block"></div>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    {% block script %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
  </body>
</html>
